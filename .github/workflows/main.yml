name: CMB-Structure-Audit CI (Syntax + Smoke Test)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Syntax & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python Syntax Check (compileall)
        run: |
          echo "🔍 Running syntax check on all Python files..."
          python -m compileall -q .

      - name: Smoke Test (Import + Basic Execution)
        run: |
          echo "🧪 Running smoke test..."
          # Test imports
          python -c "
          import numpy
          import healpy
          import scipy
          import matplotlib
          print('✅ All core imports successful')
          "

          # Quick argparse test on main scripts
          python setup_project_infrastructure.py --help > /dev/null && echo '✅ setup_project_infrastructure.py OK'
          python -c "
          import argparse
          from ultimate_integrity_audit import ultimate_integrity_audit
          print('✅ ultimate_integrity_audit imported successfully')
          " 2>/dev/null || echo '⚠️  Note: ultimate_integrity_audit requires data files (normal in CI)'
