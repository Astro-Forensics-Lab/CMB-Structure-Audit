name: Python Syntax Check (Smoke Test)

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install numpy healpy scipy matplotlib astropy

    - name: Python Syntax Check (compileall)
      run: |
        # Smoke test: verifica se todos os scripts têm sintaxe válida
        python -m compileall .
